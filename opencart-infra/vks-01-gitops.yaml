        annotations:
          run.tanzu.vmware.com/resolve-os-image: os-name=photon, content-library=cl-03a37b547e2e41e3e
    workers:
      machineDeployments:
        - class: node-pool
          name: kubernetes-cluster-4z28-np-qitf
          replicas: 1
          metadata:
            annotations:
              run.tanzu.vmware.com/resolve-os-image: os-name=photon, content-library=cl-03a37b547e2e41e3e
          variables:
            overrides:
              - name: storageClass
                value: vsan-default-storage-policy
